<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mini-Me™ Confidence Engine</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff4dc, #f7d8ff);
      color: #1f2937;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app-card {
      width: 100%;
      max-width: 820px;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    h1 {
      margin: 0;
      font-size: 34px;
      text-align: center;
      color: #2b1a12;
    }

    .tagline {
      text-align: center;
      margin: 10px 0 24px;
      font-size: 16px;
      color: #6b7280;
    }

    .mini-me-hero {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }

    .mini-me-avatar {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: #ffe8a3;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 72px;
      box-shadow: inset 0 0 0 6px #fff, 0 10px 30px rgba(0,0,0,0.12);
    }

    label {
      font-weight: bold;
      display: block;
      margin: 16px 0 8px;
    }

    textarea,
    select {
      width: 100%;
      box-sizing: border-box;
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      outline: none;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    textarea:focus,
    select:focus {
      border-color: #f59e0b;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      background: #111827;
      color: #ffffff;
    }

    button:hover {
      background: #000000;
    }

    .result-area {
      margin-top: 26px;
      display: grid;
      gap: 18px;
    }

    .result-box {
      display: none;
      background: #fff7ed;
      border: 2px solid #fed7aa;
      border-radius: 18px;
      padding: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .result-box h3 {
      margin-top: 0;
      color: #7c2d12;
    }

    .loading {
      display: none;
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
      color: #92400e;
    }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="app-card">

      <h1>Mini-Me™ Confidence Engine</h1>

      <p class="tagline">
        Let your animated inner self step out, handle the pressure, and return with confidence.
      </p>

      <div class="mini-me-hero">
        <div class="mini-me-avatar">✨</div>
      </div>

      <label for="userSituation">What situation do you need Mini-Me to handle?</label>
      <textarea 
        id="userSituation" 
        placeholder="Example: I have a job interview tomorrow and I feel nervous..."
      ></textarea>

      <label for="userEmotion">How are you feeling?</label>
      <select id="userEmotion">
        <option value="nervous">Nervous</option>
        <option value="anxious">Anxious</option>
        <option value="angry">Angry</option>
        <option value="overthinking">Overthinking</option>
        <option value="confused">Confused</option>
        <option value="afraid">Afraid</option>
        <option value="doubtful">Doubtful</option>
      </select>

      <button id="startMiniMe">Start Mini-Me Session</button>

      <div id="loadingMessage" class="loading">
        Mini-Me is stepping out now...
      </div>

      <div class="result-area">
        <div id="miniMeScene" class="result-box">
          <h3>Mini-Me World</h3>
          <div id="sceneText"></div>
        </div>

        <div id="miniMeResponse" class="result-box">
          <h3>Mini-Me Response</h3>
          <div id="responseText"></div>
        </div>
      </div>

      <p class="footer-note">
        Mini-Me™ is your playful confidence simulation engine.
      </p>

    </div>
  </div>

  <script>
    const startMiniMeBtn = document.getElementById("startMiniMe");
    const loadingMessage = document.getElementById("loadingMessage");

    const miniMeScene = document.getElementById("miniMeScene");
    const miniMeResponse = document.getElementById("miniMeResponse");

    const sceneText = document.getElementById("sceneText");
    const responseText = document.getElementById("responseText");

    startMiniMeBtn.addEventListener("click", async function () {
      const situation = document.getElementById("userSituation").value.trim();
      const emotion = document.getElementById("userEmotion").value;

      if (!situation) {
        alert("Please tell Mini-Me what situation you need help with.");
        return;
      }

      miniMeScene.style.display = "none";
      miniMeResponse.style.display = "none";
      sceneText.innerHTML = "";
      responseText.innerHTML = "";

      loadingMessage.style.display = "block";
      startMiniMeBtn.disabled = true;
      startMiniMeBtn.innerText = "Mini-Me is working...";

      try {
        const response = await fetch("https://mini-me-backend.onrender.com/api/mini-me", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            situation: situation,
            emotion: emotion
          })
        });

        if (!response.ok) {
          throw new Error("Mini-Me backend error");
        }

        const data = await response.json();

        sceneText.innerText = data.scene || "Mini-Me entered the scene, but no world was returned.";
        responseText.innerText = data.response || "Mini-Me responded, but no message was returned.";

        miniMeScene.style.display = "block";
        miniMeResponse.style.display = "block";

        if ("speechSynthesis" in window && data.response) {
          const voice = new SpeechSynthesisUtterance(data.response);
          voice.rate = 1;
          voice.pitch = 1.1;
          speechSynthesis.speak(voice);
        }

      } catch (error) {
        alert("Mini-Me could not connect yet. Check your Render backend URL and /api/mini-me route.");
        console.error(error);
      }

      loadingMessage.style.display = "none";
      startMiniMeBtn.disabled = false;
      startMiniMeBtn.innerText = "Start Mini-Me Session";
    });
  </script>
</body>
</html>
